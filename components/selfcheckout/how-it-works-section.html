<!-- Figma 3139:32709 -->
<section id="how-it-works-section" class="bg-surface-page py-section-y" aria-labelledby="how-it-works-heading">
  <div class="container-page">
    <div class="mx-auto max-w-[752px] text-center">
      <p class="font-display text-eyebrow font-medium uppercase tracking-eyebrow-wide text-brand-600">
        How FacePe Self-Checkout Works
      </p>
      <h2 id="how-it-works-heading" class="mt-3 text-heading-2 text-ink-950">
        5 steps, under <span class="text-brand-600">2 seconds.</span>
      </h2>
      <p class="mx-auto mt-5 max-w-[326px] text-body-lg text-ink-body">
        One-time setup. Instant checkout on every subsequent visit forever.
      </p>
    </div>

    <div class="mt-14" data-selfcheckout-flow-tabs>
      <div
        class="mx-auto flex w-full max-w-full overflow-x-auto whitespace-nowrap rounded-full border border-border-subtle bg-surface-0 p-2 scrollbar-hide sm:w-fit"
        role="tablist" aria-label="Self-checkout flow steps">
        <button type="button" role="tab" aria-selected="true" data-selfcheckout-flow-tab="download"
          class="shrink-0 rounded-full bg-lilac-100 px-4 py-2.5 text-[13px] font-bold text-ink-950 transition-colors">
          Download app
        </button>
        <button type="button" role="tab" aria-selected="false" data-selfcheckout-flow-tab="enroll"
          class="shrink-0 rounded-full px-4 py-2.5 text-[13px] font-medium text-ink-700 hover:bg-lilac-25 transition-colors">
          Enroll face &amp; ID
        </button>
        <button type="button" role="tab" aria-selected="false" data-selfcheckout-flow-tab="shop"
          class="shrink-0 rounded-full px-4 py-2.5 text-[13px] font-medium text-ink-700 hover:bg-lilac-25 transition-colors">
          Shop &amp; scan items
        </button>
        <button type="button" role="tab" aria-selected="false" data-selfcheckout-flow-tab="look"
          class="shrink-0 rounded-full px-4 py-2.5 text-[13px] font-medium text-ink-700 hover:bg-lilac-25 transition-colors">
          Look at the camera
        </button>
        <button type="button" role="tab" aria-selected="false" data-selfcheckout-flow-tab="receipt"
          class="shrink-0 rounded-full px-4 py-2.5 text-[13px] font-medium text-ink-700 hover:bg-lilac-25 transition-colors">
          Receipt &amp; out
        </button>
      </div>

      <div class="mt-5 overflow-hidden rounded-[36px] border border-brand-600/20 bg-surface-0 shadow-steps-panel"
        data-selfcheckout-flow-panel>
        <div
          class="grid gap-8 p-6 lg:grid-cols-[minmax(0,444px)_minmax(0,1fr)] lg:items-center lg:gap-12 lg:p-[50px] lg:min-h-[468px]">
          <div class="flex flex-col gap-4">
            <p class="font-mono text-[14px] font-bold uppercase leading-[21px] tracking-[1.12px] text-brand-600"
              data-selfcheckout-flow-label>
              STEP 01
            </p>
            <span
              class="hidden size-9 items-center justify-center rounded-[10px] border border-lilac-200 bg-lilac-25"
              data-selfcheckout-flow-icon-wrap>
              <img data-selfcheckout-flow-icon src="" alt="" width="18" height="18" class="size-[18px]"
                decoding="async" />
            </span>
            <h3 class="text-[28px] font-bold leading-tight tracking-[-0.9px] text-ink-800 sm:text-[36px]"
              data-selfcheckout-flow-title>
              Download app
            </h3>
            <p class="text-[18px] leading-normal text-ink-body" data-selfcheckout-flow-desc>
              Sign up with your name, email, and phone in just 3 minutes and you&rsquo;re all set!
            </p>
            <div class="mt-4 flex flex-wrap gap-6" data-selfcheckout-flow-stores>
              <a href="/pages/contact.html" class="inline-flex items-center gap-3 no-underline">
                <span class="flex size-11 items-center justify-center rounded-[10px] bg-ink-950">
                  <img src="../assets/images/selfcheckout/icon-app-store.svg" alt="" width="20" height="20"
                    class="size-5" decoding="async" />
                </span>
                <span>
                  <span class="block font-mono text-[10px] uppercase tracking-wider text-ink-700">Download on</span>
                  <span class="block text-[15px] font-bold text-ink-950">App Store</span>
                </span>
              </a>
              <a href="/pages/contact.html" class="inline-flex items-center gap-3 no-underline">
                <span class="flex size-11 items-center justify-center rounded-[10px] bg-ink-950">
                  <img src="../assets/images/selfcheckout/icon-google-play.png" alt="" width="24" height="25"
                    class="size-6 object-contain" decoding="async" />
                </span>
                <span>
                  <span class="block font-mono text-[10px] uppercase tracking-wider text-ink-700">Get it on</span>
                  <span class="block text-[15px] font-bold text-ink-950">Google Play</span>
                </span>
              </a>
            </div>
          </div>
          <div class="relative h-[280px] lg:h-[420px] lg:w-[630px] lg:ml-auto">
            <img data-selfcheckout-flow-image src="../assets/images/selfcheckout/flow-step-01-download.png"
              alt="FacePe app download on smartphone with enrollment screens" width="630" height="420"
              class="absolute inset-0 size-full rounded-[24px] object-cover object-center" decoding="async" />
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
