<section id="how-it-works-section" class="bg-surface-page py-section-y" aria-labelledby="how-it-works-heading">
  <div class="container-page">
    <div class="mx-auto max-w-[752px] text-center">
      <p class="font-display text-eyebrow font-medium uppercase tracking-eyebrow-wide text-brand-600">
        How FacePe Self-Checkout Works
      </p>
      <h2 id="how-it-works-heading" class="mt-3 text-heading-2 text-ink-950">
        5 steps, under <span class="text-brand-600">2 seconds.</span>
      </h2>
      <p class="mx-auto mt-5 max-w-[326px] text-body-lg text-ink-body">
        One-time setup. Instant checkout on every subsequent visit forever.
      </p>
    </div>

    <div class="mt-14" data-selfcheckout-flow-tabs>
      <div
        class="mx-auto flex w-fit flex-wrap justify-center gap-2 rounded-full border border-border-subtle bg-surface-0 p-2 sm:gap-3"
        role="tablist" aria-label="Self-checkout flow steps">
        <button type="button" role="tab" aria-selected="true" data-selfcheckout-flow-tab="download"
          class="rounded-full bg-lilac-100 px-4 py-2.5 text-[13px] font-bold text-ink-950">
          Download app
        </button>
        <button type="button" role="tab" aria-selected="false" data-selfcheckout-flow-tab="enroll"
          class="rounded-full px-4 py-2.5 text-[13px] font-medium text-ink-700 hover:bg-lilac-25">
          Enroll face &amp; ID
        </button>
        <button type="button" role="tab" aria-selected="false" data-selfcheckout-flow-tab="shop"
          class="rounded-full px-4 py-2.5 text-[13px] font-medium text-ink-700 hover:bg-lilac-25">
          Shop &amp; scan items
        </button>
        <button type="button" role="tab" aria-selected="false" data-selfcheckout-flow-tab="look"
          class="rounded-full px-4 py-2.5 text-[13px] font-medium text-ink-700 hover:bg-lilac-25">
          Look at the camera
        </button>
        <button type="button" role="tab" aria-selected="false" data-selfcheckout-flow-tab="receipt"
          class="rounded-full px-4 py-2.5 text-[13px] font-medium text-ink-700 hover:bg-lilac-25">
          Receipt &amp; out
        </button>
      </div>

      <div class="mt-5 overflow-hidden rounded-[36px] border border-brand-600/20 bg-surface-0 shadow-card"
        data-selfcheckout-flow-panel>
        <div class="grid gap-8 p-6 lg:grid-cols-2 lg:gap-12 lg:p-12">
          <div>
            <p class="font-mono text-sm font-bold uppercase tracking-wider text-brand-600" data-selfcheckout-flow-label>
              STEP 01
            </p>
            <h3 class="mt-4 text-[36px] font-bold leading-tight tracking-tight text-ink-800"
              data-selfcheckout-flow-title>
              Download app
            </h3>
            <p class="mt-4 text-body-lg text-ink-body" data-selfcheckout-flow-desc>
              Sign up with your name, email, and phone in just 3 minutes and you&rsquo;re all set!
            </p>
            <div class="mt-8 flex flex-wrap gap-6" data-selfcheckout-flow-stores>
              <a href="/pages/contact.html" class="inline-flex items-center gap-3 no-underline">
                <span class="flex size-11 items-center justify-center rounded-[10px] bg-ink-950">
                  <img src="../assets/images/figma-mcp/c879b41b-0215-4d08-b2b5-a259438b341e.svg" alt="" width="20"
                    height="20" class="size-5" decoding="async" />
                </span>
                <span>
                  <span class="block font-mono text-[10px] uppercase tracking-wider text-ink-700">Download on</span>
                  <span class="block text-[15px] font-bold text-ink-950">App Store</span>
                </span>
              </a>
              <a href="/pages/contact.html" class="inline-flex items-center gap-3 no-underline">
                <span class="flex size-11 items-center justify-center rounded-[10px] bg-ink-950">
                  <img src="../assets/images/figma-mcp/20c1e042-41a0-4525-85f6-3faa6acdc025.png" alt="" width="24"
                    height="25" class="size-6 object-contain" decoding="async" />
                </span>
                <span>
                  <span class="block font-mono text-[10px] uppercase tracking-wider text-ink-700">Get it on</span>
                  <span class="block text-[15px] font-bold text-ink-950">Google Play</span>
                </span>
              </a>
            </div>
          </div>
          <div class="relative min-h-[280px] lg:min-h-[420px]">
            <img data-selfcheckout-flow-image src="../assets/images/figma-mcp/00871601-06cb-4472-ab15-c3299c6748e5.png"
              alt="FacePe app download and enrollment flow" width="630" height="420"
              class="absolute inset-0 size-full rounded-3xl object-cover object-center" decoding="async" />
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
